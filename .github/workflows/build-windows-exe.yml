name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade pip pyinstaller certifi

      - name: Build icon from Password Ninja logo
        run: python build_password_ninja_icon.py

      - name: Build GUI executable
        run: pyinstaller --noconfirm password_ninja_gui.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-ninja-gui-windows
          path: dist/password-ninja-gui.exe
