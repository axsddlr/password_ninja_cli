name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade pip pyinstaller certifi

      - name: Build icon from Password Ninja logo
        run: python build_password_ninja_icon.py

      - name: Build GUI executable
        run: pyinstaller --noconfirm password_ninja_gui.spec

      - name: Package release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist/password-ninja-gui.exe release/
          Compress-Archive -Path release/password-ninja-gui.exe -DestinationPath dist/password-ninja-gui.zip -Force

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/password-ninja-gui.exe
            dist/password-ninja-gui.zip
          generate_release_notes: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
